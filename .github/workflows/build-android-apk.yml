name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('frontend/package-lock.json','frontend/package.json') }}

      - name: Install JS dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Download Vazir font
        working-directory: frontend
        run: |
          mkdir -p assets/fonts
          if [ ! -s assets/fonts/Vazir.ttf ]; then
            curl -L -o assets/fonts/Vazir.ttf \
              https://github.com/rastikerdar/vazir-font/raw/master/dist/Farsi-Digits/Vazir-FD.ttf
          fi

      - name: Install Gradle wrapper from RN template (avoids system Gradle 9.x)
        working-directory: frontend/android
        run: |
          TEMPLATE="../node_modules/react-native/template/android"
          if [ ! -f "$TEMPLATE/gradlew" ]; then
            echo "ERROR: RN template not found at $TEMPLATE" >&2
            exit 1
          fi
          cp "$TEMPLATE/gradlew" ./gradlew
          cp "$TEMPLATE/gradlew.bat" ./gradlew.bat 2>/dev/null || true
          mkdir -p gradle/wrapper
          cp "$TEMPLATE/gradle/wrapper/gradle-wrapper.jar" gradle/wrapper/gradle-wrapper.jar
          if [ ! -f gradle/wrapper/gradle-wrapper.properties ]; then
            cp "$TEMPLATE/gradle/wrapper/gradle-wrapper.properties" gradle/wrapper/gradle-wrapper.properties
          fi
          chmod +x gradlew
          ./gradlew --version

      - name: Cache Gradle caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('frontend/android/**/*.gradle*', 'frontend/android/**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Generate debug.keystore
        working-directory: frontend/android/app
        run: |
          if [ ! -f debug.keystore ]; then
            keytool -genkeypair -v \
              -keystore debug.keystore \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Bundle JS for Android
        working-directory: frontend
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Build Debug APK
        working-directory: frontend/android
        env:
          GRADLE_OPTS: "-Xmx4g -Dorg.gradle.jvmargs=-Xmx4g"
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EsmFamilLocal-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
